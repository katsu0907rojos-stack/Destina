<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESTINA — 写真でめぐる、最高のホテル体験</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,450;0,9..144,600;0,9..144,900;1,9..144,450&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0F1210;
    --void-2:#171B18;
    --void-3:#1F2420;
    --paper:#F6F3EC;
    --paper-dim:#DAD4C4;
    --brass:#C9A15A;
    --brass-soft:rgba(201,161,90,0.16);
    --moss:#5B6E52;
    --stone:#9C9284;
    --clay:#B65C3D;
    --line:rgba(246,243,236,0.12);
    --line-soft:rgba(246,243,236,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--void);
    color:var(--paper);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  ::selection{ background:var(--brass-soft); color:var(--paper); }
  .serif{ font-family:'Fraunces', serif; }
  .mono{ font-family:'IBM Plex Mono', monospace; letter-spacing:0.02em; }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; }

  /* ---------- top nav ---------- */
  .nav{
    position:sticky; top:0; z-index:40;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 24px;
    background:rgba(15,18,16,0.86);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line-soft);
  }
  .logo{ display:flex; flex-direction:column; line-height:1; }
  .logo .mark{ font-size:21px; font-weight:900; letter-spacing:0.04em; font-style:normal; text-transform:uppercase; }
  .logo .sub{ font-family:'Inter',sans-serif; font-size:10.5px; letter-spacing:0.04em; color:var(--stone); margin-top:6px; font-weight:600; }
  .tabs{ display:flex; gap:2px; background:var(--void-2); padding:4px; border-radius:999px; border:1px solid var(--line-soft); }
  .tab-btn{
    background:transparent; border:none; color:var(--stone);
    font-size:12.5px; padding:8px 16px; border-radius:999px;
    letter-spacing:0.03em; transition:all .25s ease;
  }
  .tab-btn.active{ background:var(--paper); color:var(--void); }
  .fav-count{
    display:inline-flex; align-items:center; justify-content:center;
    min-width:16px; height:16px; padding:0 4px; margin-left:6px;
    background:var(--brass); color:var(--void); border-radius:999px;
    font-size:10px; font-weight:600; font-family:'IBM Plex Mono',monospace;
    vertical-align:middle;
  }

  /* ---------- filter chips ---------- */
  .filters-wrap{
    display:flex; align-items:center; gap:2px;
    max-width:640px; margin:0 auto; padding:16px 12px 4px;
  }
  .filters{
    display:flex; gap:8px; overflow-x:auto; scroll-behavior:smooth;
    scrollbar-width:none; flex:1; min-width:0; padding:2px 2px;
  }
  .filters::-webkit-scrollbar{ display:none; }
  .filter-arrow{
    flex:none; width:24px; height:24px; border-radius:50%; border:none;
    background:rgba(246,243,236,0.07); color:var(--stone);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; transition:all .2s ease;
  }
  .filter-arrow:hover{ background:rgba(246,243,236,0.16); color:var(--paper); }
  .chip{
    flex:none; background:transparent; border:1px solid var(--line);
    color:var(--paper-dim); font-size:12px; padding:7px 14px; border-radius:999px;
    white-space:nowrap; transition:all .2s ease;
  }
  .chip.active{ background:var(--paper); color:var(--void); border-color:var(--paper); }

  /* ---------- feed ---------- */
  .feed{ max-width:640px; margin:0 auto; padding:16px 20px 80px; }

  @media (min-width:880px){
    .filters-wrap{ max-width:1180px; }
    .feed{ max-width:1180px; }
    #cardList{ display:grid; grid-template-columns:1fr 1fr; column-gap:40px; row-gap:8px; }
    .card{ margin-bottom:52px; }
  }
  .intro{ padding:8px 4px 26px; border-bottom:1px solid var(--line-soft); margin-bottom:22px; }
  .intro h1{ font-size:26px; font-weight:450; margin:0 0 8px; line-height:1.35; }
  .intro p{ font-size:13px; color:var(--stone); margin:0; line-height:1.7; }

  .card{ margin-bottom:44px; }
  .card-head{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; padding:0 2px;}
  .card-name{ font-size:20px; font-weight:450; cursor:pointer; }
  .card-name:hover{ color:var(--brass); }
  .card-loc{ font-size:11px; color:var(--stone); margin-top:5px; }
  .card-loc .dot{ margin:0 6px; opacity:0.5; }

  .stamp{
    flex:none; width:38px; height:38px; border-radius:50%;
    border:1.5px dashed var(--line); background:transparent;
    display:flex; align-items:center; justify-content:center;
    position:relative; transition:all .25s ease;
  }
  .stamp svg{ width:15px; height:15px; }
  .stamp path{ stroke:var(--stone); fill:none; stroke-width:1.6; transition:all .25s ease; }
  .stamp.active{ border-color:var(--brass); border-style:solid; background:var(--brass-soft); }
  .stamp.active path{ stroke:var(--brass); fill:var(--brass); }

  .gallery-wrap{ position:relative; }
  .gallery{
    display:flex; gap:6px; overflow-x:auto; scroll-snap-type:x mandatory;
    border-radius:2px; scrollbar-width:none;
  }
  .gallery::-webkit-scrollbar{ display:none; }
  .frame{
    position:relative; flex:none; scroll-snap-align:start;
    width:100%; aspect-ratio:3/2; overflow:hidden; background:var(--void-2);
  }
  .frame:not(:first-child){ width:78%; aspect-ratio:3/2; }
  .frame img{ width:100%; height:100%; object-fit:cover; display:block; }
  .frame-art{ width:100%; height:100%; position:relative; overflow:hidden; }
  .frame-photo{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1;
  }
  .frame-art::after{
    content:''; position:absolute; inset:0;
    background-image:var(--grain);
    mix-blend-mode:overlay; opacity:0.5; pointer-events:none;
  }
  .frame-art::before{
    content:''; position:absolute; inset:0;
    background:radial-gradient(120% 90% at 78% 8%, rgba(255,255,255,0.30), transparent 55%),
               radial-gradient(90% 70% at 12% 96%, rgba(0,0,0,0.35), transparent 60%);
    pointer-events:none;
  }
  .frame-cap{
    position:absolute; left:10px; bottom:9px; font-size:10px; letter-spacing:0.02em;
    color:var(--paper); text-shadow:0 1px 6px rgba(0,0,0,0.5); z-index:2; max-width:75%;
  }
  .frame-idx{
    position:absolute; bottom:9px; right:10px; font-size:9.5px;
    color:var(--paper); background:rgba(15,18,16,0.55); backdrop-filter:blur(3px);
    padding:2px 7px; border-radius:20px; font-family:'IBM Plex Mono',monospace; letter-spacing:0.04em;
    z-index:2;
  }
  .sprocket{
    position:absolute; top:0; left:0; right:0; height:5px;
    background-image:repeating-linear-gradient(90deg, var(--void) 0 3px, transparent 3px 9px);
    opacity:0.55; z-index:2;
  }

  .gallery-arrow{
    position:absolute; top:50%; transform:translateY(-50%); z-index:5;
    width:32px; height:32px; border-radius:50%; border:none;
    background:rgba(15,18,16,0.32); backdrop-filter:blur(3px);
    display:flex; align-items:center; justify-content:center;
    opacity:0.75; transition:opacity .2s ease, background .2s ease;
  }
  .gallery-arrow:hover{ opacity:1; background:rgba(15,18,16,0.5); }
  .gallery-arrow.left{ left:8px; }
  .gallery-arrow.right{ right:8px; }
  .gallery-arrow svg{ width:9px; height:9px; }
  .gallery-arrow polygon{ fill:rgba(246,243,236,0.85); }

  .card-foot{ display:flex; justify-content:space-between; align-items:center; padding:12px 2px 0; }
  .price{ font-family:'IBM Plex Mono',monospace; font-size:13.5px; }
  .price .from{ color:var(--stone); font-size:10.5px; margin-left:3px;}
  .rating{ font-size:11px; color:var(--stone); margin-left:12px; }
  .rating b{ color:var(--paper); font-weight:500; }
  .detail-link{
    font-size:11.5px; color:var(--brass); display:flex; align-items:center; gap:4px;
    border-bottom:1px solid transparent;
  }
  .detail-link:hover{ border-color:var(--brass); }

  /* ---------- modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(8,9,8,0.72); backdrop-filter:blur(4px);
    z-index:100; display:none; align-items:flex-end; justify-content:center;
  }
  .overlay.open{ display:flex; }
  .modal{
    background:var(--void-2); width:100%; max-width:640px; max-height:92vh; overflow-y:auto;
    border-radius:18px 18px 0 0; border:1px solid var(--line-soft); border-bottom:none;
    animation:rise .35s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes rise{ from{ transform:translateY(24px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .modal-hero{ position:relative; width:100%; aspect-ratio:4/3; overflow:hidden; }
  .modal-hero img{ width:100%; height:100%; object-fit:cover; }
  .modal-hero .frame-art{ position:absolute; inset:0; }
  .modal-close{
    position:absolute; top:16px; right:16px; width:34px; height:34px; border-radius:50%;
    background:rgba(15,18,16,0.6); backdrop-filter:blur(6px); border:1px solid var(--line);
    color:var(--paper); font-size:16px; display:flex; align-items:center; justify-content:center;
  }
  .modal-body{ padding:26px 26px 40px; }
  .modal-eyebrow{ font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.18em; color:var(--brass); text-transform:uppercase; }
  .modal-title{ font-size:28px; margin:8px 0 4px; }
  .modal-loc{ color:var(--stone); font-size:12.5px; margin-bottom:20px;}
  .modal-desc{ font-size:13.5px; line-height:1.9; color:var(--paper-dim); margin-bottom:22px; }

  .tag-row{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:24px; }
  .tag{ font-size:10.5px; border:1px solid var(--line); color:var(--stone); padding:5px 11px; border-radius:999px; }

  .stat-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line-soft); border:1px solid var(--line-soft); border-radius:10px; overflow:hidden; margin-bottom:24px; }
  .stat{ background:var(--void); padding:14px 10px; text-align:center; }
  .stat .v{ font-family:'IBM Plex Mono',monospace; font-size:15px; color:var(--brass); }
  .stat .l{ font-size:9.5px; color:var(--stone); margin-top:5px; letter-spacing:0.04em; }

  .map-box{
    position:relative; height:170px; border-radius:12px; overflow:hidden; margin-bottom:24px;
    border:1px solid var(--line-soft); background:var(--void-3);
  }
  .map-box iframe{ width:100%; height:100%; border:0; display:block; filter:grayscale(0.15) contrast(1.05); }
  .map-coord{ position:absolute; bottom:10px; left:12px; font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--paper-dim); background:rgba(15,18,16,0.6); padding:3px 8px; border-radius:5px; pointer-events:none; z-index:2; }

  .modal-actions{ display:flex; gap:10px; }
  .btn{
    flex:1; text-align:center; padding:14px; border-radius:10px; font-size:13px; font-weight:500;
    display:flex; align-items:center; justify-content:center; gap:6px; border:1px solid var(--line);
  }
  .btn-primary{ background:var(--brass); color:var(--void); border-color:var(--brass); }
  .btn-ghost{
    flex:0 0 52px; height:52px; padding:0; border-radius:50%;
    border:1.5px dashed var(--line); background:transparent;
    color:var(--stone);
  }
  .btn-ghost svg{ width:18px; height:18px; }
  .btn-ghost path{ stroke:var(--stone); fill:none; stroke-width:1.6; transition:all .25s ease; }
  .btn-ghost:hover{ border-color:var(--paper-dim); }
  .btn-ghost:hover path{ stroke:var(--paper); }
  .btn-ghost.active{ border-color:var(--brass); border-style:solid; background:var(--brass-soft); }
  .btn-ghost.active path{ stroke:var(--brass); fill:var(--brass); }

  /* ---------- compare page ---------- */
  .compare-wrap{ max-width:920px; margin:0 auto; padding:28px 20px 80px; }
  .compare-head h1{ font-size:24px; margin:0 0 6px; font-weight:450; }
  .compare-head p{ font-size:12.5px; color:var(--stone); margin:0 0 26px; }
  .empty{ text-align:center; padding:80px 20px; border:1px dashed var(--line); border-radius:16px; }
  .empty .ico{ font-size:26px; margin-bottom:14px; }
  .empty p{ color:var(--stone); font-size:13px; margin:0 0 18px; }
  .empty button{ background:var(--paper); color:var(--void); border:none; padding:11px 22px; border-radius:999px; font-size:12.5px; }

  .table-scroll{ overflow-x:auto; border-radius:12px; border:1px solid var(--line-soft); }
  table{ border-collapse:collapse; width:100%; min-width:640px; }
  th,td{ padding:14px 16px; text-align:left; border-bottom:1px solid var(--line-soft); font-size:12.5px; white-space:nowrap; }
  td.access-cell{ white-space:normal; max-width:230px; min-width:180px; line-height:1.6; word-break:break-word; }
  thead th{ font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--stone); background:var(--void-2); }
  tbody th{ font-size:9.5px; color:var(--stone); font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:0.08em; background:var(--void-2); position:sticky; left:0; }
  .th-photo img{ width:96px; height:64px; object-fit:cover; border-radius:6px; display:block; }
  .th-photo .frame-art{ width:96px; height:64px; border-radius:6px; }
  .th-name{ font-size:13px; }
  .th-name .loc{ color:var(--stone); font-size:10.5px; margin-top:3px; }
  .price-cell{ font-family:'IBM Plex Mono',monospace; }
  .price-cell.best{ color:var(--brass); font-weight:600; }
  .price-cell.best::after{ content:" ◆最安"; font-size:9px; }
  .remove-btn{ color:var(--stone); font-size:11px; border:1px solid var(--line); border-radius:6px; padding:5px 10px; }
  .book-btn{
    display:inline-block; color:var(--void); background:var(--brass); font-size:11.5px; font-weight:500;
    border-radius:6px; padding:7px 12px; white-space:nowrap; transition:opacity .2s ease;
  }
  .book-btn:hover{ opacity:0.85; }
  .remove-btn:hover{ color:var(--clay); border-color:var(--clay); }

  footer.credit{ text-align:center; padding:30px 20px 50px; font-size:10.5px; color:var(--stone); }
  footer.credit .mono{ opacity:0.7; }
</style>
</head>
<body>

<nav class="nav">
  <div class="logo">
    <span class="mark serif">Destina</span>
    <span class="sub">Curated Destination Hotels</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="feed" onclick="switchTab('feed')">ホーム</button>

</nav>

<main id="feedPage" class="feed">

  </div>
  <div id="cardList"></div>
</main>

<main id="comparePage" class="compare-wrap" style="display:none;"></main>

<footer class="credit">

</footer>

<div class="overlay" id="overlay">
  <div class="modal" id="modalContent"></div>
</div>

const FILTERS = ['すべて','ビーチフロント','プライベートプール','温泉付き客室','サウナ付き客室','シティホテル'];
let activeTag = 'すべて';
let favorites = new Set();

// 外部画像を使わず、ホテルごとの色味からグラデーション「写真」を生成する
function grainDataUri(){
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(#n)' opacity='0.35'/></svg>`;
  return `url('data:image/svg+xml,${encodeURIComponent(svg)}')`;
}
const GRAIN_URI = grainDataUri();

function artStyle(hue, index, total){
  const h1 = (hue + index*9) % 360;
  const h2 = (hue + 34 + index*6) % 360;
  const light1 = 30 + (index % 3) * 6;
  const light2 = 14 + ((index+1) % 3) * 5;
  const angle = 120 + index*22;
  return `--grain:${GRAIN_URI}; background:` +
    `linear-gradient(${angle}deg, hsl(${h1} 46% ${light1}%), hsl(${h2} 40% ${light2}%));`;
}

function artHTML(h, index, caption, showIdx){
  const idxTag = showIdx ? `<span class="frame-idx">${String(index+1).padStart(2,'0')} / ${String(h.photos.length).padStart(2,'0')}</span>` : '';
  const realUrl = (index===0 && h.hero) ? h.hero : (h.photoUrls && h.photoUrls[index]);
  const photoTag = realUrl
    ? `<img class="frame-photo" loading="lazy" alt="${h.name}" src="${realUrl}" onerror="this.remove()">`
    : '';
  return `<div class="frame-art" style="${artStyle(h.hue, index, h.photos.length)}">
      ${photoTag}
      <span class="frame-cap mono">${caption}</span>${idxTag}
    </div>`;
}

function yen(n){ return (n===null || n===undefined) ? '要問合せ' : '¥' + n.toLocaleString('ja-JP'); }

function parseCoord(str){
  const m = str.match(/(-?\d+\.?\d*)°\s*([NS]),\s*(-?\d+\.?\d*)°\s*([EW])/);
  if(!m) return null;
  const lat = parseFloat(m[1]) * (m[2]==='S' ? -1 : 1);
  const lng = parseFloat(m[3]) * (m[4]==='W' ? -1 : 1);
  return { lat, lng };
}
function dash(v, unit){ return (v===null || v===undefined) ? '-' : v + (unit||''); }

function scrollGallery(btn, dir){
  const wrap = btn.closest('.gallery-wrap');
  const gallery = wrap.querySelector('.gallery');
  const frame = wrap.querySelector('.frame');
  const step = frame ? frame.offsetWidth * 0.9 : 260;
  gallery.scrollBy({ left: dir * step, behavior: 'smooth' });
}

function scrollFilters(dir){
  const el = document.getElementById('filters');
  el.scrollBy({ left: dir * 160, behavior: 'smooth' });
}

function heartIcon(){
  return `<svg viewBox="0 0 24 24"><path d="M12 20 C6 15 2 11.5 2 7.8 C2 4.9 4.3 3 6.9 3 C8.7 3 10.4 4 12 6 C13.6 4 15.3 3 17.1 3 C19.7 3 22 4.9 22 7.8 C22 11.5 18 15 12 20 Z"/></svg>`;
}

function renderFilters(){
  const el = document.getElementById('filters');
  el.innerHTML = FILTERS.map(t=>`<button class="chip ${t===activeTag?'active':''}" onclick="setTag('${t}')">${t}</button>`).join('');
}
function setTag(t){ activeTag = t; renderFilters(); renderFeed(); }

function renderFeed(){
  const list = HOTELS.filter(h => activeTag==='すべて' || (h.category && h.category.includes(activeTag)));
  document.getElementById('cardList').innerHTML = list.map(h => cardHTML(h)).join('');
}

function cardHTML(h){
  const isFav = favorites.has(h.id);
  return `
  <article class="card">
    <div class="card-head">
      <div>
        <div class="card-name serif" onclick="openModal('${h.id}')">${h.name}</div>
        <div class="card-loc mono">${h.region}<span class="dot">·</span>${h.tags[0]}</div>
      </div>
      <button class="stamp ${isFav?'active':''}" onclick="toggleFav('${h.id}', event)">${heartIcon()}</button>
    </div>
    <div class="gallery-wrap">
      <button class="gallery-arrow left" onclick="scrollGallery(this,-1)" aria-label="前の写真">
        <svg viewBox="0 0 10 10"><polygon points="8,0 8,10 0,5"/></svg>
      </button>
      <div class="gallery">
        ${h.photos.map((cap,i)=>`
          <div class="frame">
            ${artHTML(h, i, cap, true)}
          </div>`).join('')}
      </div>
      <button class="gallery-arrow right" onclick="scrollGallery(this,1)" aria-label="次の写真">
        <svg viewBox="0 0 10 10"><polygon points="2,0 2,10 10,5"/></svg>
      </button>
    </div>
    <div class="card-foot">
      <div>
        <span class="price">${yen(h.price)}<span class="from">〜 / 泊</span></span>
        <span class="rating">★ <b>${dash(h.rating)}</b></span>
      </div>
      <a class="detail-link" onclick="openModal('${h.id}')">詳細を見る →</a>
    </div>
  </article>`;
}

function toggleFav(id, e){
  if(e) e.stopPropagation();
  if(favorites.has(id)) favorites.delete(id); else favorites.add(id);
  document.getElementById('favCount').textContent = favorites.size;
  renderFeed();
  if(document.getElementById('overlay').classList.contains('open')) openModal(id, true);
  if(document.getElementById('comparePage').style.display !== 'none') renderCompare();
}

function openModal(id, silent){
  const h = HOTELS.find(x=>x.id===id);
  const isFav = favorites.has(id);
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-hero">
      ${artHTML(h, 0, h.photos[0], false)}
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-eyebrow mono">${h.tags.join(' / ')}</div>
      <div class="modal-title serif">${h.name}</div>
      <div class="modal-loc mono">${h.region}</div>
      <p class="modal-desc">${h.desc}</p>
      <div class="tag-row">${h.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="stat-row">
        <div class="stat"><div class="v">${yen(h.price)}</div><div class="l">最安値 / 泊</div></div>
        <div class="stat"><div class="v">★ ${dash(h.rating)}</div><div class="l">評価</div></div>
        <div class="stat"><div class="v">${dash(h.built,'年')}</div><div class="l">オープン年</div></div>
      </div>
      <div class="map-box">
        ${(() => {
          const p = parseCoord(h.coord);
          return p
            ? `<iframe src="https://www.google.com/maps?q=${p.lat},${p.lng}&z=9&output=embed" loading="lazy" referrerpolicy="no-referrer-when-downgrade" allowfullscreen></iframe>`
            : '';
        })()}
        <div class="map-coord">${h.coord}</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost ${isFav?'active':''}" onclick="toggleFav('${h.id}')" aria-label="お気に入り登録">${heartIcon()}</button>
        <a class="btn btn-primary" target="_blank" rel="noopener" href="${h.bookingUrl || ('https://travel.rakuten.co.jp/dsearch/?f_keyword=' + encodeURIComponent(h.name+' '+h.region))}">楽天トラベルで空室確認 ↗</a>
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') closeModal(); });

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('feedPage').style.display = tab==='feed' ? 'block' : 'none';
  document.getElementById('filters').style.display = tab==='feed' ? 'flex' : 'none';
  document.getElementById('comparePage').style.display = tab==='compare' ? 'block' : 'none';
  if(tab==='compare') renderCompare();
}

function renderCompare(){
  const list = HOTELS.filter(h=>favorites.has(h.id));
  const wrap = document.getElementById('comparePage');
  if(list.length===0){
    wrap.innerHTML = `
      <div class="compare-head">
        <h1 class="serif">比較する</h1>
        <p>お気に入りに登録したホテルを、料金・評価・オープン年などで見比べられます。</p>
      </div>
      <div class="empty">
        <div class="ico">◇</div>
        <p>まだお気に入りがありません。気になるホテルの<br class="br">スタンプボタンを押して追加してください。</p>
        <button onclick="switchTab('feed')">ホームへ戻る</button>
      </div>`;
    return;
  }
  const knownPrices = list.map(h=>h.price).filter(p => p !== null && p !== undefined);
  const minPrice = knownPrices.length ? Math.min(...knownPrices) : null;
  wrap.innerHTML = `
    <div class="compare-head">
      <h1 class="serif">比較する</h1>
      <p>${list.length}件のホテルを比較中。最安値には ◆ が付きます。</p>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th style="position:sticky;left:0;background:var(--void-2);">項目</th>
          ${list.map(h=>`<th class="th-photo">${artHTML(h, 0, '', false)}</th>`).join('')}
        </tr></thead>
        <tbody>
          <tr><th>ホテル名</th>${list.map(h=>`<td class="th-name">${h.name}<div class="loc">${h.region}</div></td>`).join('')}</tr>
          <tr><th>最安値 / 泊</th>${list.map(h=>`<td class="price-cell ${(h.price!==null && h.price===minPrice)?'best':''}">${yen(h.price)}</td>`).join('')}</tr>
          <tr><th>評価</th>${list.map(h=>`<td>★ ${dash(h.rating)}</td>`).join('')}</tr>
          <tr><th>オープン年</th>${list.map(h=>`<td class="mono">${dash(h.built,'年')}</td>`).join('')}</tr>
          <tr><th>リニューアル</th>${list.map(h=>`<td class="mono">${h.renovated ? h.renovated+'年' : '-'}</td>`).join('')}</tr>
          <tr><th>総部屋数</th>${list.map(h=>`<td class="mono">${dash(h.rooms,'室')}</td>`).join('')}</tr>
          <tr><th>アクセス</th>${list.map(h=>`<td class="access-cell">${h.access}</td>`).join('')}</tr>
          <tr><th>タイプ</th>${list.map(h=>`<td>${h.tags[0]}</td>`).join('')}</tr>
          <tr><th>予約</th>${list.map(h=>`<td><a class="book-btn" target="_blank" rel="noopener" href="${h.bookingUrl || ('https://travel.rakuten.co.jp/dsearch/?f_keyword=' + encodeURIComponent(h.name+' '+h.region))}">楽天トラベルで見る ↗</a></td>`).join('')}</tr>
          <tr><th>操作</th>${list.map(h=>`<td><button class="remove-btn" onclick="toggleFav('${h.id}')">お気に入り解除</button></td>`).join('')}</tr>
        </tbody>
      </table>
    </div>`;
}

renderFilters();
renderFeed();

// 起動時に、裏側で自動収集された最新データ（価格・評価・代表写真）を取得して上書きする。
// 失敗しても、あらかじめ埋め込まれているデータでそのまま表示され続けるので安全。
(async function syncLiveData(){
  try {
    const res = await fetch('/.netlify/functions/get-hotels');
    if(!res.ok) return;
    const data = await res.json();
    if(!data || !data.hotels) return;
    let changed = false;
    HOTELS.forEach(h => {
      const live = data.hotels[h.id];
      if(!live || live.error) return;
      if(typeof live.price === 'number') h.price = live.price;
      if(typeof live.rating === 'number') h.rating = Math.round(live.rating*10)/10;
      if(live.hero) h.hero = live.hero;
      if(live.access) h.access = live.access;
      changed = true;
    });
    if(changed){ renderFeed(); }
  } catch(err){
    // ネットワークエラー等は無視し、埋め込みデータのまま表示を続ける
    console.warn('live data sync skipped:', err);
  }
})();
</script>
</body>
</html>
